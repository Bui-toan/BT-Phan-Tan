version: '3.8'
services:
  user-service:
    build: ./user_service
    ports:
      - "5001:5001"
    networks:
      - micro-network

  order-service:
    build: ./order_service
    ports:
      - "5002:5002"
    depends_on:
      - user-service
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge